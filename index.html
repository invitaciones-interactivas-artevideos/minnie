<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minnie rosada - Invitación</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Pinyon+Script&family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@400;600&family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        @font-face { font-family: 'Waltograph'; src: url('waltographUI.ttf') format('truetype'); }
        @font-face { font-family: 'Walt Disney Script'; src: url('wds052801.ttf') format('truetype'); }

        :root {
            --fuente-nombre: 'Walt Disney Script', cursive;
            --tamano-nombre-pc: 5rem;
            --tamano-nombre-celular: 4.5rem;
            --fuente-titulos: 'Walt Disney Script', cursive;
            --color-titulos: #e6007e; 
        }

        body { background-color: #cfd6ce; font-family: 'Cormorant Garamond', serif; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; min-height: 100vh; position: relative; overflow-x: hidden; background: transparent; padding-bottom: 25px; }
        .seccion { padding: 30px 20px; position: relative; z-index: 10; background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(8px); border-radius: 20px; margin: 25px 20px; border: 1px solid rgba(255, 255, 255, 0.35); }
        .img-box { position: absolute; z-index: 20; pointer-events: none; }
        .titulo-seccion { font-family: var(--fuente-titulos); font-size: 2rem; color: var(--color-titulos); text-align: center; margin: 5px 0; }
        
        /* CONTADOR REORGANIZADO */
        .circulo-contador {
            width: 320px; height: 320px; margin: 20px auto; border: 3px solid #e6007e; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;
        }
        .contenedor-contador-interno { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 10px; }
        .numeros-contador { font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 900; color: #2b3d2c; }
        .etiquetas-contador { display: flex; gap: 10px; font-size: 0.9rem; font-weight: 600; color: #2b3d2c; }
        
        @media (max-width: 480px) {
            /* Moña de arriba (imagen9) agrandada */
            .img-top-right[src="imagen9.png"] { width: 140px !important; margin-top: -30px; margin-right: -20px; }
            
            /* Ajuste de textos en celular */
            .circulo-contador { width: 90vw; height: 90vw; }
            .texto-dorado { font-family: var(--fuente-titulos); font-size: 3rem !important; color: #e6007e !important; background: none !important; }
            .numeros-contador { font-size: 1.6rem !important; }
            .etiquetas-contador { font-size: 0.7rem !important; }
            
            /* Imagen de Minnie dentro del círculo */
            .circulo-contador img[src="imagencontador.png"] { width: 120px !important; margin-top: 10px; position: relative !important; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SECCIÓN 2: FECHA Y CONTADOR -->
        <div class="seccion">
            <img src="imagen9.png" class="img-box img-top-right" alt="">
            <h2 class="titulo-seccion">SÁBADO</h2>
            <h3 class="titulo-seccion">4 DE NOVIEMBRE</h3>

            <div class="circulo-contador">
                <div class="contenedor-contador-interno">
                    <h3 class="texto-dorado">Faltan</h3>
                    <div class="numeros-contador" id="contador">00 : 00 : 00 : 00</div>
                    <div class="etiquetas-contador">
                        <span>DÍAS</span><span>HORAS</span><span>MIN.</span><span>SEG.</span>
                    </div>
                    <img src="imagencontador.png" alt="Minnie">
                </div>
            </div>
        </div>
    </div>

    <script>
        const fechaEvento = new Date(2026, 10, 4, 21, 0, 0).getTime();
        setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaEvento - ahora;
            const d = Math.floor(distancia / (1000*60*60*24));
            const h = Math.floor((distancia % (1000*60*60*24)) / (1000*60*60));
            const m = Math.floor((distancia % (1000*60*60)) / (1000*60));
            const s = Math.floor((distancia % (1000*60)) / 1000);
            document.getElementById("contador").innerHTML = d + " : " + h + " : " + m + " : " + s;
        }, 1000);
    </script>
</body>
</html>
